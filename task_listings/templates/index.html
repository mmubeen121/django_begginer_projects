<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Listing</title>
  </head>
  <body>
    <h1>Task Listing</h1>
    <ul>
      {% for task in tasks %}
      <li>
        <a href='{% url 'task_detail' title=task.title %}'>{{ task.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
